  schema: food_diary
object_relationships:
  - name: nutrition_item
    using:
      manual_configuration:
        column_mapping:
          nutrition_item_id: id
        insertion_order: null
        remote_table:
          name: nutrition_item
          schema: food_diary
  - name: recipe
    using:
      manual_configuration:
        column_mapping:
          recipe_id: id
        insertion_order: null
        remote_table:
          name: recipe
          schema: food_diary
select_permissions:
